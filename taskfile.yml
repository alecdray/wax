version: "3"

dotenv:
  - .env

vars: {}

tasks:
  default:
    cmds:
      - task -a
  build/templ:
    cmds:
      - templ generate
  build/tailwind:
    cmds:
      - npx @tailwindcss/cli -i ./static/src/main.css -o ./static/public/main.css
  build/sqlc:
    cmds:
      - sqlc generate
  build/server:
    cmds:
      - go build -v -o ./bin/app ./src/cmd/app.go
  build/pull-discogs:
    cmds:
      - go build -v -o ./bin/pull-discogs ./src/cmd/pull-discogs/
  pull-discogs:
    cmds:
      - task build/pull-discogs
      - ./bin/pull-discogs
  build/pull-genres:
    cmds:
      - go build -v -o ./bin/pull-genres ./src/cmd/pull-genres/
  pull-genres:
    cmds:
      - task build/pull-genres
      - ./bin/pull-genres
  genre-explorer:
    cmds:
      - go run ./src/cmd/genre-explorer/
  build:
    cmds:
      - task build/templ build/tailwind build/sqlc build/server
  run:
    cmds:
      - go run ./src/cmd/app.go
  dev/templ:
    cmds:
      - templ generate --watch --proxy="http://localhost:$PORT" --open-browser=false -v 2>&1 | tee ./tmp/dev-templ.log
  dev/server:
    cmds:
      - >
        air
        --build.cmd "go build -v -o ./bin/app ./src/cmd/app.go"
        --build.entrypoint "./bin/app"
        --build.delay "100"
        --build.exclude_dir "node_modules"
        --build.include_ext "go"
        --build.stop_on_error false
        2>&1 | tee ./tmp/dev-server.log
  dev/tailwind:
    cmds:
      - npx --yes @tailwindcss/cli -i ./static/src/main.css -o ./static/public/main.css --watch 2>&1 | tee ./tmp/dev-tailwind.log
  dev/sync-assets:
    cmds:
      - >
        air
        --build.cmd "templ generate --notify-proxy"
        --build.delay "100"
        --build.exclude_dir "node_modules"
        --build.include_ext "tmpl,css"
  dev:
    deps:
      - dev/server
      - dev/tailwind
      - dev/templ
      - dev/sync-assets
  docker/build:
    cmds:
      - task build/tailwind
      - docker build -t wax .
  docker/run:
    cmds:
      - >
        docker run -d
        -p $PORT:$PORT
        -v ${DOCKER_DATA_DIR:-/data}:/data
        -e ENV=${ENV:-production}
        -e SPOTIFY_ID=$SPOTIFY_ID
        -e SPOTIFY_SECRET=$SPOTIFY_SECRET
        -e JWT_SECRET=$JWT_SECRET
        -e SPOTIFY_TOKEN_SECRET=$SPOTIFY_TOKEN_SECRET
        -e CONTACT_EMAIL=$CONTACT_EMAIL
        wax
  db/create:
    cmds:
      - goose -dir db/migrations create {{.CLI_ARGS}} sql
  db/up:
    cmds:
      - goose up
      - sqlite3 $GOOSE_DBSTRING .schema > ./db/schema.sql
      - sqlc generate
  test/unit:
    desc: Run Go unit tests
    cmds:
      - go test ./src/...
  test/e2e:
    desc: Run Playwright E2E tests (requires app running on port 4691)
    cmds:
      - npx playwright test {{.CLI_ARGS}}
  test:
    desc: Run all tests
    cmds:
      - task test/unit
  git/commit:
    cmds:
      - git commit -m "{{.CLI_ARGS}}"
